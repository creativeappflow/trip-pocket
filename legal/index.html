<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Pocket</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.7;
            color: #333;
            background: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            text-align: center;
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h1 { font-size: 32px; color: #1a1a1a; margin-bottom: 8px; }
        .subtitle { color: #888; font-size: 15px; margin-bottom: 32px; }
        .links { display: flex; flex-direction: column; gap: 12px; }
        .links a {
            display: block;
            padding: 14px 24px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .links a:hover {
            background: #F2B33A;
            color: #1a1a1a;
            border-color: #F2B33A;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Trip Pocket ✈️</h1>
        <p class="subtitle">여행 지출 관리 앱</p>
        <div class="links">
            <a href="privacy-policy.html">개인정보 처리방침 / Privacy Policy</a>
            <a href="terms-of-service.html">이용약관 / Terms of Service</a>
        </div>
    </div>
</body>
</html>
